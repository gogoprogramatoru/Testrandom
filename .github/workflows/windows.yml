name: Construire Windows Installer
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: 1. Descarcă codul sursă
      uses: actions/checkout@v4

    - name: 2. Instalează Qt pe server
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        
    - name: 3. Compilează aplicația (.exe)
      run: |
        mkdir build
        cd build
        cmake ..
        cmake --build . --config Release
        
    - name: 4. Adaugă DLL-urile necesare (windeployqt)
      run: |
        cd build/Release
        windeployqt VerificatorPar.exe
        
    - name: 5. Instalează Inno Setup pe serverul Windows
      run: choco install innosetup
        
    - name: 6. Construiește Installer-ul (Setup.exe)
      # Folosim calea completă către Inno Setup Compiler (iscc)
      run: '"C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer.iss'
        
    - name: 7. Salvează Installer-ul final
      uses: actions/upload-artifact@v4
      with:
        name: VerificatorPar-Setup-Oficial
        # Acum salvăm doar fișierul Setup.exe, nu tot folderul
        path: Output/VerificatorPar_Setup.exe